<!DOCTYPE html>
<html>
<head>
    <title>Firebase Emulator Token Generator</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
    <h1>Firebase Emulator Token Generator</h1>
    <button id="signInBtn">Sign in with Google</button>
    <hr>
    <h2>Your ID Token:</h2>
    <textarea id="idToken" rows="10" cols="80" readonly></textarea>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCuuA52N6bRmTnmJFTe5QD952RGdPrUYkk",
            authDomain: "wimbeledon-ages.firebaseapp.com",
            projectId: "wimbeledon-ages"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const signInBtn = document.getElementById('signInBtn');
        const idTokenText = document.getElementById('idToken');

        signInBtn.onclick = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const idToken = await user.getIdToken();
                idTokenText.value = idToken;
                console.log("Token copied to text area.");
            } catch (error) {
                console.error("Error signing in: ", error);
                idTokenText.value = "Error: " + error.message;
            }
        };
    </script>
</body>
</html>
